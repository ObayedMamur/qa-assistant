name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  # Code Quality and Security Checks
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl, zip
        tools: composer, wp-cli
        
    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-
        
    - name: Install Composer dependencies
      run: |
        if [ -f "composer.json" ]; then
          composer install --no-dev --optimize-autoloader
        fi
        
    - name: Setup WordPress for testing
      run: |
        wp core download --path=/tmp/wordpress --allow-root
        wp config create --dbname=test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
        
    - name: Start MySQL
      run: sudo systemctl start mysql
      
    - name: Create test database
      run: |
        mysql -u root -proot -e "CREATE DATABASE test;"
        
    - name: Install WordPress
      run: |
        wp core install --url=localhost --title="Test Site" --admin_user=admin --admin_password=admin --admin_email=test@example.com --path=/tmp/wordpress --allow-root
        
    - name: Copy plugin to WordPress
      run: |
        mkdir -p /tmp/wordpress/wp-content/plugins/qa-assistant
        cp -r . /tmp/wordpress/wp-content/plugins/qa-assistant/
        
    - name: Install Plugin Check
      run: |
        wp plugin install plugin-check --activate --path=/tmp/wordpress --allow-root
        
    - name: Run Plugin Check
      run: |
        cd /tmp/wordpress
        wp plugin check qa-assistant --format=json --allow-root > plugin-check-results.json || true
        
    - name: Display Plugin Check Results
      run: |
        cd /tmp/wordpress
        echo "=== Plugin Check Results ==="
        cat plugin-check-results.json
        
        # Check for critical errors (not warnings)
        if grep -q '"type":"ERROR"' plugin-check-results.json; then
          echo "❌ Critical errors found in Plugin Check"
          grep '"type":"ERROR"' plugin-check-results.json
          exit 1
        else
          echo "✅ No critical errors found"
        fi
        
    - name: Upload Plugin Check Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: plugin-check-results
        path: /tmp/wordpress/plugin-check-results.json

  # Build and Package
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get plugin version
      id: version
      run: |
        VERSION=$(grep "Version:" qa-assistant.php | sed 's/.*Version: *//' | sed 's/ .*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Plugin version: $VERSION"
        
    - name: Create production build
      run: |
        # Make build script executable
        chmod +x build.sh
        
        # Run build script
        ./build.sh
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: qa-assistant-v${{ steps.version.outputs.version }}
        path: qa-assistant-v${{ steps.version.outputs.version }}.zip
        
    - name: Upload build directory
      uses: actions/upload-artifact@v3
      with:
        name: build-directory
        path: build/

  # Test on Multiple PHP Versions
  test-matrix:
    name: Test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, zip
        tools: wp-cli
        
    - name: Test PHP syntax
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./build/*" | xargs -I {} php -l {}
        
    - name: Setup WordPress for PHP ${{ matrix.php-version }}
      run: |
        wp core download --path=/tmp/wordpress --allow-root
        wp config create --dbname=test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
        
    - name: Start MySQL
      run: sudo systemctl start mysql
      
    - name: Create test database
      run: |
        mysql -u root -proot -e "CREATE DATABASE test;"
        
    - name: Install WordPress
      run: |
        wp core install --url=localhost --title="Test Site" --admin_user=admin --admin_password=admin --admin_email=test@example.com --path=/tmp/wordpress --allow-root
        
    - name: Test plugin activation
      run: |
        mkdir -p /tmp/wordpress/wp-content/plugins/qa-assistant
        cp -r . /tmp/wordpress/wp-content/plugins/qa-assistant/
        wp plugin activate qa-assistant --path=/tmp/wordpress --allow-root
        echo "✅ Plugin activated successfully on PHP ${{ matrix.php-version }}"
