name: Deploy to WordPress.org

on:
  release:
    types: [ published ]

jobs:
  deploy:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get plugin version
      id: version
      run: |
        VERSION=$(grep "Version:" qa-assistant.php | sed 's/.*Version: *//' | sed 's/ .*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Plugin version: $VERSION"
        
    - name: Validate version matches tag
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        PLUGIN_VERSION="${{ steps.version.outputs.version }}"
        
        if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
          echo "❌ Version mismatch: Tag is v$TAG_VERSION but plugin version is $PLUGIN_VERSION"
          exit 1
        fi
        
        echo "✅ Version validation passed: $PLUGIN_VERSION"
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl, zip
        tools: wp-cli
        
    - name: Final Plugin Check
      run: |
        wp core download --path=/tmp/wordpress --allow-root
        wp config create --dbname=test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
        
        # Start MySQL and create database
        sudo systemctl start mysql
        mysql -u root -proot -e "CREATE DATABASE test;"
        
        # Install WordPress
        wp core install --url=localhost --title="Test Site" --admin_user=admin --admin_password=admin --admin_email=test@example.com --path=/tmp/wordpress --allow-root
        
        # Copy plugin and install Plugin Check
        mkdir -p /tmp/wordpress/wp-content/plugins/qa-assistant
        cp -r . /tmp/wordpress/wp-content/plugins/qa-assistant/
        wp plugin install plugin-check --activate --path=/tmp/wordpress --allow-root
        
        # Run final check
        cd /tmp/wordpress
        wp plugin check qa-assistant --format=json --allow-root > final-check.json || true
        
        # Fail if critical errors found
        if grep -q '"type":"ERROR"' final-check.json; then
          echo "❌ Critical errors found - deployment cancelled"
          cat final-check.json
          exit 1
        fi
        
        echo "✅ Final Plugin Check passed"
        
    - name: Create production build
      run: |
        chmod +x build.sh
        ./build.sh
        
    - name: WordPress Plugin Deploy
      id: deploy
      uses: 10up/action-wordpress-plugin-deploy@stable
      with:
        generate-zip: true
        assets-dir: .wordpress-org
      env:
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SLUG: qa-assistant
        
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: qa-assistant-v${{ steps.version.outputs.version }}.zip
        asset_name: qa-assistant-v${{ steps.version.outputs.version }}.zip
        asset_content_type: application/zip
        
    - name: Notify deployment success
      run: |
        echo "🎉 Successfully deployed QA Assistant v${{ steps.version.outputs.version }} to WordPress.org!"
        echo "📦 Release asset uploaded to GitHub"
        echo "🔗 Plugin URL: https://wordpress.org/plugins/qa-assistant/"
