name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

jobs:
  # Quick validation checks
  validation:
    name: Quick Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check file structure
      run: |
        echo "🔍 Checking plugin file structure..."
        
        # Check required files exist
        required_files=("qa-assistant.php" "readme.txt" ".distignore")
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ Required file missing: $file"
            exit 1
          fi
        done
        
        echo "✅ All required files present"
        
    - name: Validate plugin header
      run: |
        echo "🔍 Validating plugin header..."
        
        # Check plugin header exists
        if ! grep -q "Plugin Name:" qa-assistant.php; then
          echo "❌ Plugin Name header missing"
          exit 1
        fi
        
        if ! grep -q "Version:" qa-assistant.php; then
          echo "❌ Version header missing"
          exit 1
        fi
        
        echo "✅ Plugin header validation passed"
        
    - name: Check version consistency
      run: |
        echo "🔍 Checking version consistency..."
        
        # Extract versions
        PLUGIN_VERSION=$(grep "Version:" qa-assistant.php | sed 's/.*Version: *//' | sed 's/ .*//')
        README_VERSION=$(grep "Stable tag:" readme.txt | sed 's/.*Stable tag: *//' | sed 's/ .*//')
        CLASS_VERSION=$(grep "const version" qa-assistant.php | sed "s/.*= '//" | sed "s/'.*//")
        
        echo "Plugin header version: $PLUGIN_VERSION"
        echo "Readme stable tag: $README_VERSION"
        echo "Class constant version: $CLASS_VERSION"
        
        # Check if all versions match
        if [ "$PLUGIN_VERSION" != "$README_VERSION" ] || [ "$PLUGIN_VERSION" != "$CLASS_VERSION" ]; then
          echo "❌ Version mismatch detected"
          exit 1
        fi
        
        echo "✅ All versions are consistent: $PLUGIN_VERSION"

  # Security and code quality
  security-check:
    name: Security & Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl, zip
        tools: wp-cli
        
    - name: PHP Syntax Check
      run: |
        echo "🔍 Checking PHP syntax..."
        find . -name "*.php" -not -path "./vendor/*" -not -path "./build/*" | xargs -I {} php -l {}
        echo "✅ PHP syntax check passed"
        
    - name: Security scan
      run: |
        echo "🔍 Running basic security checks..."
        
        # Check for common security issues
        if grep -r "eval(" --include="*.php" .; then
          echo "❌ Found eval() usage - potential security risk"
          exit 1
        fi
        
        if grep -r "\$_GET\[" --include="*.php" . | grep -v "sanitize\|wp_unslash"; then
          echo "⚠️  Found unsanitized \$_GET usage"
        fi
        
        if grep -r "\$_POST\[" --include="*.php" . | grep -v "sanitize\|wp_unslash"; then
          echo "⚠️  Found unsanitized \$_POST usage"
        fi
        
        echo "✅ Basic security scan completed"

  # Plugin Check
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl, zip
        tools: wp-cli
        
    - name: Setup WordPress
      run: |
        wp core download --path=/tmp/wordpress --allow-root
        wp config create --dbname=test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
        
    - name: Start MySQL
      run: sudo systemctl start mysql
      
    - name: Create test database
      run: |
        mysql -u root -proot -e "CREATE DATABASE test;"
        
    - name: Install WordPress
      run: |
        wp core install --url=localhost --title="Test Site" --admin_user=admin --admin_password=admin --admin_email=test@example.com --path=/tmp/wordpress --allow-root
        
    - name: Install Plugin Check
      run: |
        wp plugin install plugin-check --activate --path=/tmp/wordpress --allow-root
        
    - name: Copy plugin
      run: |
        mkdir -p /tmp/wordpress/wp-content/plugins/qa-assistant
        cp -r . /tmp/wordpress/wp-content/plugins/qa-assistant/
        
    - name: Run Plugin Check
      run: |
        cd /tmp/wordpress
        echo "🔍 Running WordPress Plugin Check..."
        
        # Run plugin check and capture results
        wp plugin check qa-assistant --format=json --allow-root > plugin-check-results.json || true
        
        # Display results
        echo "=== Plugin Check Results ==="
        cat plugin-check-results.json
        
        # Count errors and warnings
        ERROR_COUNT=$(grep -c '"type":"ERROR"' plugin-check-results.json || echo "0")
        WARNING_COUNT=$(grep -c '"type":"WARNING"' plugin-check-results.json || echo "0")
        
        echo ""
        echo "📊 Summary:"
        echo "   Errors: $ERROR_COUNT"
        echo "   Warnings: $WARNING_COUNT"
        
        # Fail on critical errors (excluding expected hidden file errors)
        CRITICAL_ERRORS=$(grep '"type":"ERROR"' plugin-check-results.json | grep -v '"code":"hidden_files"' | wc -l || echo "0")
        
        if [ "$CRITICAL_ERRORS" -gt 0 ]; then
          echo "❌ Critical errors found (excluding expected hidden file warnings)"
          exit 1
        fi
        
        echo "✅ Plugin Check passed (ignoring expected development file warnings)"
        
    - name: Test plugin activation
      run: |
        cd /tmp/wordpress
        echo "🔍 Testing plugin activation..."
        wp plugin activate qa-assistant --allow-root
        echo "✅ Plugin activated successfully"

  # Comment on PR with results
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [validation, security-check, plugin-check]
    if: always()
    
    steps:
    - name: Comment PR
      uses: actions/github-script@v6
      with:
        script: |
          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          
          let status = "✅ All checks passed!";
          let details = "All validation, security, and plugin checks completed successfully.";
          
          if ("${{ needs.validation.result }}" !== "success" || 
              "${{ needs.security-check.result }}" !== "success" || 
              "${{ needs.plugin-check.result }}" !== "success") {
            status = "❌ Some checks failed";
            details = "Please review the failed checks and fix any issues.";
          }
          
          const comment = `## 🔍 Pull Request Check Results
          
          ${status}
          
          ### Check Status:
          - **Validation**: ${{ needs.validation.result }}
          - **Security Check**: ${{ needs.security-check.result }}
          - **Plugin Check**: ${{ needs.plugin-check.result }}
          
          ${details}
          
          ---
          *Automated check by GitHub Actions*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
