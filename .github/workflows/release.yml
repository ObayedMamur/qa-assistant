name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get plugin version
      id: version
      run: |
        VERSION=$(grep "Version:" qa-assistant.php | sed 's/.*Version: *//' | sed 's/ .*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Plugin version: $VERSION"
        
    - name: Validate version matches tag
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        PLUGIN_VERSION="${{ steps.version.outputs.version }}"
        
        if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
          echo "❌ Version mismatch: Tag is v$TAG_VERSION but plugin version is $PLUGIN_VERSION"
          exit 1
        fi
        
        echo "✅ Version validation passed: $PLUGIN_VERSION"
        
    - name: Extract changelog for this version
      id: changelog
      run: |
        # Extract changelog section for current version from readme.txt
        VERSION="${{ steps.version.outputs.version }}"
        
        # Create a basic changelog if readme.txt doesn't have detailed changelog
        CHANGELOG="## What's New in v${VERSION}

        🚀 **New Features & Improvements:**
        - Enhanced Git branch management functionality
        - Improved security with proper input sanitization
        - Better error handling and user feedback
        - Modern UI/UX improvements
        - Comprehensive Plugin Check compliance

        🛡️ **Security Enhancements:**
        - Added proper nonce verification for all forms
        - Implemented input sanitization and validation
        - Enhanced output escaping for XSS protection

        🔧 **Technical Improvements:**
        - Clean production build process
        - Automated testing and deployment
        - Better code organization and documentation

        📦 **Installation:**
        Download the plugin ZIP file and install it through your WordPress admin panel.

        🔗 **Links:**
        - [Plugin Homepage](https://obayedmamur.com/qa-assistant)
        - [Support](https://github.com/ObayedMamur/qa-assistant/issues)
        - [Documentation](https://github.com/ObayedMamur/qa-assistant/blob/main/BUILD.md)"
        
        # Save changelog to file
        echo "$CHANGELOG" > RELEASE_CHANGELOG.md
        
    - name: Create production build
      run: |
        chmod +x build.sh
        ./build.sh
        
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: QA Assistant v${{ steps.version.outputs.version }}
        body_path: RELEASE_CHANGELOG.md
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: qa-assistant-v${{ steps.version.outputs.version }}.zip
        asset_name: qa-assistant-v${{ steps.version.outputs.version }}.zip
        asset_content_type: application/zip
        
    - name: Upload Build Directory
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build.tar.gz
        asset_name: qa-assistant-build-v${{ steps.version.outputs.version }}.tar.gz
        asset_content_type: application/gzip
        
    - name: Create build archive
      run: |
        tar -czf build.tar.gz build/
        
    - name: Notify release creation
      run: |
        echo "🎉 GitHub Release created successfully!"
        echo "📦 Version: v${{ steps.version.outputs.version }}"
        echo "🔗 Release URL: ${{ steps.create_release.outputs.html_url }}"
