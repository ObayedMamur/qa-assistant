name: Build and Attach Release ZIP

on:
  push:
    tags:
      - 'v*' # Trigger on any tag that starts with 'v' (e.g., v2.0.1)

permissions:
  contents: write # Needed to create releases and upload assets

jobs:
  build_release:
    name: Build & Upload Release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer
          
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using Node 20 for build scripts
          
      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Run Build Script to generate ZIP
        run: ./build.sh

      - name: Get Version Number
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: qa-assistant-v${{ env.VERSION }}.zip
          generate_release_notes: true
