<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="120" fill="#2271b1" stroke="#135e96" stroke-width="4"/>
  
  <!-- Git Branch Icon -->
  <g transform="translate(128, 128)">
    <!-- Main Branch -->
    <circle cx="-40" cy="-30" r="8" fill="#ffffff"/>
    <circle cx="-40" cy="0" r="8" fill="#ffffff"/>
    <circle cx="-40" cy="30" r="8" fill="#ffffff"/>
    <line x1="-40" y1="-22" x2="-40" y2="22" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Feature Branch -->
    <circle cx="20" cy="-15" r="8" fill="#00a32a"/>
    <circle cx="40" cy="15" r="8" fill="#00a32a"/>
    <path d="M -32 -30 Q 0 -30 20 -15" stroke="#00a32a" stroke-width="3" fill="none"/>
    <line x1="20" y1="-7" x2="40" y2="7" stroke="#00a32a" stroke-width="3"/>
    
    <!-- QA Badge -->
    <rect x="45" y="-45" width="35" height="20" rx="10" fill="#d63638"/>
    <text x="62.5" y="-30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">QA</text>
  </g>
  
  <!-- Plugin Title -->
  <text x="128" y="220" text-anchor="middle" fill="#135e96" font-family="Arial, sans-serif" font-size="16" font-weight="bold">QA Assistant</text>
</svg>
